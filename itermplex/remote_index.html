<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>itermplex remote</title>
<link rel="stylesheet" href="/vendor/xterm.css">
<style>
  body { margin: 0; background: #000; color: #ccc; font-family: -apple-system, sans-serif; }
  #list { padding: 12px; }
  #list h1 { font-size: 15px; font-weight: 600; color: #888; margin: 4px 2px 10px; }
  #list button { display: block; width: 100%; text-align: left; padding: 10px; margin: 6px 0;
    background: #1c1c1e; color: #eee; border: 1px solid #333; border-radius: 8px; font-size: 15px; }
  #term { position: fixed; inset: 0; display: none; }
  #status { position: fixed; left: 0; right: 0; top: 0; padding: 8px 12px; z-index: 10;
    background: #3a2a00; color: #ffcf6b; font-size: 13px; text-align: center; display: none; }
  #status button { margin-left: 10px; background: #5a4200; color: #ffe6a8;
    border: 1px solid #7a5a00; border-radius: 6px; padding: 2px 8px; font-size: 12px; }
</style>
</head>
<body>
<div id="status"></div>
<div id="list"></div>
<div id="term"></div>
<script src="/vendor/xterm.js"></script>
<script>
const params = new URLSearchParams(location.search);
const token = params.get("token") || "";

function showStatus(text, withBackButton) {
  const status = document.getElementById("status");
  status.textContent = text;
  if (withBackButton) {
    const back = document.createElement("button");
    back.textContent = "Back to sessions";
    back.onclick = () => location.reload();
    status.appendChild(back);
  }
  status.style.display = "block";
}

function hideStatus() {
  const status = document.getElementById("status");
  status.style.display = "none";
  status.textContent = "";
}

async function loadSessions() {
  const list = document.getElementById("list");
  let res;
  try {
    res = await fetch("/api/sessions?token=" + encodeURIComponent(token));
  } catch (e) {
    list.textContent = "Cannot reach itermplex.";
    return;
  }
  if (!res.ok) { list.textContent = "Unauthorized. Check the token in your link."; return; }
  let workspaces;
  try {
    workspaces = await res.json();
  } catch (e) {
    list.textContent = "Unexpected response from itermplex.";
    return;
  }
  list.innerHTML = "";
  const heading = document.createElement("h1");
  heading.textContent = "itermplex sessions";
  list.appendChild(heading);
  let count = 0;
  for (const ws of workspaces) {
    for (const s of ws.sessions) {
      count++;
      const b = document.createElement("button");
      b.textContent = ws.workspace + " / " + s.label + " (" + s.kind + ")";
      b.onclick = () => attach(s.id);
      list.appendChild(b);
    }
  }
  if (count === 0) {
    const empty = document.createElement("div");
    empty.textContent = "No sessions open.";
    list.appendChild(empty);
  }
}

function attach(sessionId) {
  document.getElementById("list").style.display = "none";
  const host = document.getElementById("term");
  host.style.display = "block";
  const term = new Terminal({ convertEol: false, cursorBlink: true });
  term.open(host);
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const url = proto + "//" + location.host + "/attach?session=" +
    encodeURIComponent(sessionId) + "&token=" + encodeURIComponent(token);
  const ws = new WebSocket(url);
  let sessionEnded = false;
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === "resize") term.resize(msg.cols, msg.rows);
    else if (msg.type === "data") term.write(msg.vt);
    else if (msg.type === "ended") {
      sessionEnded = true;
      showStatus("Session ended.", true);
      ws.close();
    }
  };
  ws.onerror = () => {
    if (!sessionEnded) showStatus("Connection error.", true);
  };
  ws.onclose = () => {
    if (!sessionEnded) showStatus("Disconnected. Check that itermplex is reachable and your link is current.", true);
  };
  term.onData((data) => {
    if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ data }));
  });
}

loadSessions();
</script>
</body>
</html>
