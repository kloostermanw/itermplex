name: itermplex
options:
  bundleIdPrefix: eu.kloosterman
  deploymentTarget:
    macOS: "14.0"
packages:
  MCP:
    url: https://github.com/modelcontextprotocol/swift-sdk
    from: "0.12.1"
  Hummingbird:
    url: https://github.com/hummingbird-project/hummingbird
    from: "2.25.0"
  HummingbirdWebSocket:
    url: https://github.com/hummingbird-project/hummingbird-websocket
    from: "2.2.0"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"
targets:
  itermplex:
    type: application
    platform: macOS
    sources: [itermplex]
    dependencies:
      - package: MCP
        product: MCP
      - package: Hummingbird
        product: Hummingbird
      - package: HummingbirdWebSocket
        product: HummingbirdWebSocket
      - package: SwiftTerm
        product: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: eu.kloosterman.itermplex
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "itermplex controls iTerm2 to open and focus terminals."
        MARKETING_VERSION: "1.1.2"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
  itermplexTests:
    type: bundle.unit-test
    platform: macOS
    sources: [itermplexTests]
    dependencies:
      - target: itermplex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: eu.kloosterman.itermplexTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
schemes:
  itermplex:
    build:
      targets:
        itermplex: all
        itermplexTests: [test]
    test:
      targets:
        - itermplexTests
